name: Playwright CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      DEBUG: pw:api
      QABRAINS_BASEURL: https://practice.qabrains.com/ecommerce/
      QABRAINS_email: test@qabrains.com
      QABRAINS_password: Password123
      AUTOMATIONEXERCISE_email: fake42@gmail.com
      AUTOMATIONEXERCISE_password: Password123

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Load environment variables
        run: cat .env >> $GITHUB_ENV

      - name: Run tests
        run: npx playwright test --reporter=html,line

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/